# sops-nix configuration
# This file defines which age keys can decrypt which secrets
#
# To add a new host:
# 1. Add the host's age public key to 'keys' section
# 2. Add a creation_rules entry for secrets/hosts/<hostname>.yaml
#    with key_groups: [*admin, *<hostname>]
#
# Each host can decrypt its own secrets file + the common secrets file.

keys:
  # Personal admin key (can edit all secrets)
  - &admin age1x8775mjx938ax8whcygmh85tj53vrxv70wuwx2ce0hlem6qy0e4qqptt3m

  # Host-specific keys (for automatic decryption on each machine)
  - &desktop age127rqyv3mhpyfhu9cvvk3c408rts36a8p0c6u4re3086ydw5tzffqjkc5np
  - &macbook age1g5k7y7zpke4qxctprx9emd69qkv7ayavn8869sjzfn68rc64lavq8lxjqt

creation_rules:
  # Per-host secrets - each host file is encrypted for: admin + that host
  - path_regex: secrets/hosts/desktop\.yaml$
    key_groups:
      - age: [*admin, *desktop]

  - path_regex: secrets/hosts/macbook\.yaml$
    key_groups:
      - age: [*admin, *macbook]

  # Shared secrets - encrypted for admin + all hosts
  - path_regex: secrets/api-keys\.yaml$
    key_groups:
      - age: [*admin, *desktop, *macbook]
